<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🐋 Whale Reference Images</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #020d1a; color: #e2e8f0; max-width: 900px; margin: 40px auto; padding: 0 24px; }
  h1 { color: #06b6d4; font-size: 22px; margin-bottom: 6px; }
  p { color: #64748b; font-size: 14px; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #0f1f2e; border: 1px solid #1e3a4a; border-radius: 10px; overflow: hidden; }
  .card img { width: 100%; display: block; }
  .card .info { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .card .name { font-size: 13px; font-weight: 600; }
  .card a { background: #06b6d4; color: #020d1a; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; text-decoration: none; }
  .card a:hover { background: #0891b2; }
</style>
</head>
<body>
<h1>🐋 Whale Reference Images — No Spots</h1>
<p>Clean whale shots for Canva overlay. Right-click any image to save, or use the Download button.</p>
<div class="grid">
  <div class="card"><img src="whale-body-full.png"><div class="info"><span class="name">Full Body</span><a href="whale-body-full.png" download>Download</a></div></div>
  <div class="card"><img src="whale-flank-left.png"><div class="info"><span class="name">Left Flank</span><a href="whale-flank-left.png" download>Download</a></div></div>
  <div class="card"><img src="whale-flank-right.png"><div class="info"><span class="name">Right Flank</span><a href="whale-flank-right.png" download>Download</a></div></div>
  <div class="card"><img src="whale-dorsal-fin.png"><div class="info"><span class="name">Dorsal Fin</span><a href="whale-dorsal-fin.png" download>Download</a></div></div>
  <div class="card"><img src="whale-body-and-fin.png"><div class="info"><span class="name">Body + Fin</span><a href="whale-body-and-fin.png" download>Download</a></div></div>
</div>
</body>
</html>
