<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Blast — Review Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0630; font-family:'Nunito',sans-serif; color:#fff; min-height:100vh; }
  .layout { display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar { width:210px; flex-shrink:0; background:rgba(0,0,0,0.4); border-right:1px solid rgba(255,255,255,0.08); padding:20px 0; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .sidebar-title { font-size:11px; font-weight:900; color:#6655aa; text-transform:uppercase; letter-spacing:2px; padding:0 20px 14px; }
  .issue-tab { display:flex; align-items:center; gap:8px; padding:11px 20px; cursor:pointer; border-left:3px solid transparent; transition:all 0.15s; font-size:13px; font-weight:700; color:#9988cc; }
  .issue-tab:hover { background:rgba(123,47,255,0.1); color:#fff; }
  .issue-tab.active { border-left-color:#7b2fff; background:rgba(123,47,255,0.15); color:#fff; }
  .tab-num { font-size:10px; font-weight:900; background:rgba(123,47,255,0.3); border-radius:6px; padding:2px 7px; flex-shrink:0; }
  .tab-name { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tab-prog { font-size:10px; color:#554488; flex-shrink:0; }
  .issue-tab.active .tab-prog { color:#aa77ff; }
  .export-btn { margin:20px 14px 0; display:block; background:linear-gradient(135deg,#7b2fff,#ff2fff); color:white;
    font-family:'Nunito',sans-serif; font-size:12px; font-weight:900; padding:9px 14px; border-radius:10px;
    border:none; cursor:pointer; width:calc(100% - 28px); }

  /* MAIN */
  .main { flex:1; padding:24px 24px; }
  .page-header { margin-bottom:24px; }
  .page-header h1 { font-size:26px; font-weight:900; color:#ffdd00; }
  .page-header p { font-size:13px; color:#8877aa; margin-top:4px; }
  .stats-row { display:flex; gap:12px; margin-top:14px; flex-wrap:wrap; }
  .stat-pill { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:6px 14px; font-size:12px; font-weight:700; }
  .stat-pill span { color:#ffdd00; }

  /* PANEL */
  .issue-panel { display:none; }
  .issue-panel.active { display:block; }
  .issue-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.08); flex-wrap:wrap; }
  .issue-emoji { font-size:28px; }
  .issue-header h2 { font-size:20px; font-weight:900; flex:1; }
  .issue-link { font-size:12px; color:#aa77ff; text-decoration:none; background:rgba(123,47,255,0.15); padding:5px 14px; border-radius:10px; white-space:nowrap; }
  .issue-link:hover { background:rgba(123,47,255,0.3); }

  /* CHAPTER SECTION */
  .ch-section { margin-bottom:6px; }
  .ch-header { font-size:12px; font-weight:900; color:#aa77ff; text-transform:uppercase; letter-spacing:1.5px; padding:14px 0 8px; border-top:1px solid rgba(255,255,255,0.06); margin-top:8px; }
  .ch-header:first-of-type { border-top:none; margin-top:0; }

  /* ITEM ROW */
  .item-row { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:10px 12px; margin-bottom:6px; transition:border-color 0.15s; }
  .item-row.pass { border-color:rgba(0,220,100,0.35); background:rgba(0,220,100,0.04); }
  .item-row.fail { border-color:rgba(255,50,50,0.35); background:rgba(255,50,50,0.04); }

  /* TYPE ICON */
  .type-badge { font-size:13px; flex-shrink:0; width:28px; text-align:center; }

  /* THUMBNAIL */
  .thumb { flex-shrink:0; width:72px; height:54px; border-radius:7px; overflow:hidden; background:#1a0f30; border:1px solid rgba(255,255,255,0.08); cursor:pointer; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb-placeholder { display:flex; align-items:center; justify-content:center; height:100%; font-size:18px; color:#332255; }

  /* PLAY BTN */
  .play-btn { width:38px; height:38px; border-radius:50%; border:none; cursor:pointer; flex-shrink:0;
    background:linear-gradient(135deg,#7b2fff,#ff2fff); color:white; font-size:13px;
    display:flex; align-items:center; justify-content:center; transition:transform 0.15s; }
  .play-btn:hover { transform:scale(1.08); }
  .play-btn.playing { background:linear-gradient(135deg,#ff2fff,#ff8800); }

  /* LABEL */
  .item-label { flex:1; min-width:0; }
  .item-name { font-size:13px; font-weight:700; color:#ddd; }
  .item-file { font-size:11px; color:#554488; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* CONTROLS */
  .item-controls { display:flex; align-items:center; gap:7px; flex-shrink:0; }
  .vote-btn { padding:4px 12px; border-radius:7px; border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:900; font-size:11px; transition:all 0.15s; white-space:nowrap; }
  .pass-btn { background:rgba(0,220,100,0.12); color:#00dc64; border:1px solid rgba(0,220,100,0.25); }
  .pass-btn:hover, .pass-btn.active { background:rgba(0,220,100,0.28); border-color:#00dc64; }
  .fail-btn { background:rgba(255,50,50,0.12); color:#ff8888; border:1px solid rgba(255,50,50,0.25); }
  .fail-btn:hover, .fail-btn.active { background:rgba(255,50,50,0.28); border-color:#ff3232; }
  .comment-input { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:7px; color:#fff; font-family:'Nunito',sans-serif; font-size:11px; padding:4px 9px; width:180px; height:30px; resize:none; }
  .comment-input:focus { outline:none; border-color:#7b2fff; }
  .comment-input::placeholder { color:#443366; }

  /* LIGHTBOX */
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; align-items:center; justify-content:center; cursor:pointer; }
  #lightbox.open { display:flex; }
  #lightbox img { max-width:92vw; max-height:92vh; border-radius:12px; object-fit:contain; }

  /* EXPORT */
  #export-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; }
  #export-modal.open { display:flex; }
  .export-box { background:#1a0f30; border:1px solid rgba(123,47,255,0.4); border-radius:16px; padding:22px; max-width:660px; width:92%; display:flex; flex-direction:column; }
  .export-box h3 { font-size:17px; font-weight:900; color:#ffdd00; margin-bottom:10px; }
  .export-text { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:12px; font-size:11px; color:#ccc; font-family:monospace; overflow-y:auto; white-space:pre-wrap; max-height:55vh; min-height:150px; }
  .export-actions { display:flex; gap:8px; margin-top:12px; }
  .copy-btn { background:linear-gradient(135deg,#7b2fff,#ff2fff); color:white; border:none; padding:8px 18px; border-radius:9px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:900; font-size:12px; }
  .close-btn { background:rgba(255,255,255,0.07); color:#ddd; border:1px solid rgba(255,255,255,0.12); padding:8px 18px; border-radius:9px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:12px; }

  @media (max-width: 640px) {
    .sidebar { width:60px; }
    .tab-name, .tab-prog { display:none; }
    .comment-input { width:110px; }
    .issue-tab { padding:11px; justify-content:center; }
  }
</style>

<div id="lightbox"><img id="lightbox-img" src="" /></div>

// ── STATE ──
let state = {};
let currentAudio = null;

function loadState(){ const s=localStorage.getItem('mb_review2'); if(s) state=JSON.parse(s); }
function saveState(){ localStorage.setItem('mb_review2', JSON.stringify(state)); updateStats(); }
function key(num,id){ return `i${num}_${id}`; }
function getItem(k){ return state[k]||{vote:null,comment:''}; }

function vote(k, v){
  if(!state[k]) state[k]={vote:null,comment:''};
  state[k].vote = state[k].vote===v ? null : v;
  saveState();
  const row=document.getElementById('row_'+k);
  const it=getItem(k);
  row.className='item-row'+(it.vote?' '+it.vote:'');
  row.querySelectorAll('.vote-btn').forEach(b=>b.classList.remove('active'));
  if(it.vote==='pass') row.querySelector('.pass-btn').classList.add('active');
  if(it.vote==='fail') row.querySelector('.fail-btn').classList.add('active');
}
function setComment(k,v){ if(!state[k]) state[k]={vote:null,comment:''}; state[k].comment=v; saveState(); }

function countReviewed(num){
  const seq=SEQUENCES[num]||[];
  let done=0;
  seq.forEach(item=>{ if(item.file && state[key(num,item.id)]?.vote) done++; });
  return {total: seq.filter(i=>i.file).length, done};
}

function updateStats(){
  let ta=0,da=0,pa=0,fa=0;
  ISSUES.forEach(({num})=>{
    const {total,done}=countReviewed(num);
    ta+=total; da+=done;
  });
  Object.values(state).forEach(v=>{ if(v.vote==='pass') pa++; if(v.vote==='fail') fa++; });
  document.getElementById('overall-stats').innerHTML=`
    <div class="stat-pill">Reviewed: <span>${da}/${ta}</span></div>
    <div class="stat-pill">✅ Pass: <span>${pa}</span></div>
    <div class="stat-pill">❌ Fail: <span>${fa}</span></div>`;
  document.querySelectorAll('.issue-tab').forEach(t=>{
    const n=parseInt(t.dataset.num);
    const {total,done}=countReviewed(n);
    t.querySelector('.tab-prog').textContent=`${done}/${total}`;
  });
}

function showIssue(num){
  document.querySelectorAll('.issue-tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.num)===num));
  document.querySelectorAll('.issue-panel').forEach(p=>p.classList.toggle('active',parseInt(p.dataset.num)===num));
}

function toggleAudio(k, issueNum, file){
  const btn=document.getElementById('play_'+k);
  if(currentAudio&&!currentAudio.paused){
    currentAudio.pause(); currentAudio=null;
    document.querySelectorAll('.play-btn').forEach(b=>{b.textContent='▶';b.classList.remove('playing');});
    if(btn._file===file&&btn._key===k) return;
  }
  const url=BASE+'sounds/issue00'+issueNum+'/'+file;
  const a=new Audio(url);
  btn.textContent='⏸'; btn.classList.add('playing');
  btn._file=file; btn._key=k;
  currentAudio=a;
  a.play().catch(()=>{btn.textContent='▶';btn.classList.remove('playing');});
  a.onended=()=>{btn.textContent='▶';btn.classList.remove('playing');currentAudio=null;};
}

function openLightbox(url){
  document.getElementById('lightbox-img').src=url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick=()=>document.getElementById('lightbox').classList.remove('open');

// ── CHAPTER GROUPS ──
function chLabel(id){
  if(id.startsWith('ch')) return 'Chapter '+id.replace('ch','');
  const n=parseInt((id.match(/q(\d+)/)||[])[1]);
  if(!n) return '';
  if(n<=2) return 'Chapter 1';
  if(n<=4) return 'Chapter 2';
  if(n<=6) return 'Chapter 3';
  if(n<=8) return 'Chapter 4';
  return 'Chapter 5';
}

function buildUI(){
  const sidebar=document.getElementById('sidebar-tabs');
  const panels=document.getElementById('panels');

  ISSUES.forEach(({num,emoji,title})=>{
    // Sidebar
    const tab=document.createElement('div');
    tab.className='issue-tab'+(num===1?' active':'');
    tab.dataset.num=num;
    tab.innerHTML=`<span class="tab-num">#${num}</span><span class="tab-name">${emoji} ${title}</span><span class="tab-prog">0/0</span>`;
    tab.onclick=()=>showIssue(num);
    sidebar.appendChild(tab);

    // Panel
    const panel=document.createElement('div');
    panel.className='issue-panel'+(num===1?' active':'');
    panel.dataset.num=num;
    const issStr=String(num).padStart(3,'0');
    panel.innerHTML=`<div class="issue-header"><span class="issue-emoji">${emoji}</span><h2>Issue ${num}: ${title}</h2><a class="issue-link" href="${BASE}issue-${issStr}-narrated.html" target="_blank">▶ Open Issue</a></div>`;

    const seq=SEQUENCES[num]||[];
    let lastCh='';

    seq.forEach(item=>{
      if(!item.file) return; // skip items with no file (SVG clocks etc)

      const k=key(num,item.id);
      const it=getItem(k);

      // Chapter header
      const ch=chLabel(item.id);
      if(ch && ch!==lastCh){
        const hdr=document.createElement('div');
        hdr.className='ch-header';
        hdr.textContent=`— ${ch} —`;
        panel.appendChild(hdr);
        lastCh=ch;
      }

      const row=document.createElement('div');
      row.className='item-row'+(it.vote?' '+it.vote:'');
      row.id='row_'+k;

      let leftHtml='';
      if(item.type==='img'){
        const imgUrl=BASE+'images/'+item.file;
        leftHtml=`<span class="type-badge">🖼️</span><div class="thumb" onclick="openLightbox('${imgUrl}')"><img src="${imgUrl}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'thumb-placeholder\\'>?</div>'" /></div>`;
      } else {
        leftHtml=`<span class="type-badge">🎙️</span><button class="play-btn" id="play_${k}" onclick="toggleAudio('${k}',${num},'${item.file}')">▶</button>`;
      }

      row.innerHTML=`
        ${leftHtml}
        <div class="item-label">
          <div class="item-name">${item.label}</div>
          <div class="item-file">${item.file}</div>
        </div>
        <div class="item-controls">
          <div style="display:flex;gap:6px;margin-bottom:5px;">
            <button class="vote-btn pass-btn${it.vote==='pass'?' active':''}" onclick="vote('${k}','pass')">✅ Pass</button>
            <button class="vote-btn fail-btn${it.vote==='fail'?' active':''}" onclick="vote('${k}','fail')">❌ Fail</button>
          </div>
          <textarea class="comment-input" placeholder="Comment..." onchange="setComment('${k}',this.value)" onblur="setComment('${k}',this.value)">${it.comment||''}</textarea>
        </div>`;
      panel.appendChild(row);
    });

    panels.appendChild(panel);
  });
}

function openExport(){
  const lines=['# Math Blast Review Export',`Generated: ${new Date().toLocaleString()}`,''];
  ISSUES.forEach(({num,emoji,title})=>{
    lines.push(`## Issue ${num}: ${emoji} ${title}`);
    const seq=SEQUENCES[num]||[];
    seq.forEach(item=>{
      if(!item.file) return;
      const k=key(num,item.id);
      const it=getItem(k);
      if(it.vote||it.comment) lines.push(`  [${(it.vote||'—').toUpperCase()}] ${item.label} (${item.file})${it.comment?' → '+it.comment:''}`);
    });
    lines.push('');
  });
  document.getElementById('export-text').textContent=lines.join('\n');
  document.getElementById('export-modal').classList.add('open');
}
function closeExport(){ document.getElementById('export-modal').classList.remove('open'); }
function copyExport(){
  navigator.clipboard.writeText(document.getElementById('export-text').textContent);
  const b=document.querySelector('.copy-btn'); b.textContent='✅ Copied!';
  setTimeout(()=>b.textContent='📋 Copy',2000);
}

loadState();
buildUI();
updateStats();
</script>
